<!DOCTYPE html>
<html>
<head>
    <title>Color Palette App</title>
    <style>
        body {
            font-family: Arial;
            background: #f7f7f7;
            padding: 40px;
        }

        h1 {
            color: #0A59DB;
        }

        .palette {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .color {
            width: 140px;
            height: 140px;
            border-radius: 15px;
        }

        .c1 { background: #3B82F6; }
        .c2 { background: #0A59DB; }
        .c3 { background: #063B92; }
        .c4 { background: #031D49; }
    </style>
</head>
<body>
    <h1>Color Palette App</h1>
    <p>CI/CD Pipeline using Jenkins, Docker, GitHub, and Docker Hub</p>

    <div class="palette">
        <div class="color c1"></div>
        <div class="color c2"></div>
        <div class="color c3"></div>
        <div class="color c4"></div>
    </div>
</body>
</html>
